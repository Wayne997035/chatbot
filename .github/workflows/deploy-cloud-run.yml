name: Build and Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-east1
  SERVICE_NAME: chatbot-app
  REGISTRY: asia-east1-docker.pkg.dev
  IMAGE_REPO: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/chatbot-repo/chatbot

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-tag.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set image tag
        id: image-tag
        run: echo "image=${{ env.IMAGE_REPO }}:${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-tag.outputs.image }}
            ${{ env.IMAGE_REPO }}:latest

  deploy:
    name: Deploy to Cloud Run
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.build.outputs.image }}
          region: ${{ env.REGION }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=gcp
          flags: '--allow-unauthenticated --memory=512Mi --cpu=1 --min-instances=0 --max-instances=1'

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
