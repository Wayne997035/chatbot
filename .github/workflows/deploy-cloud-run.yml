name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - '**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-east1
  SERVICE_NAME: chatbot-app
  REGISTRY: asia-east1-docker.pkg.dev
  IMAGE_REPO: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/chatbot-repo/chatbot

jobs:
  # Step 1: Gradle build JAR (auto, all branches)
  build-jar:
    name: 1. Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon --console=plain

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*-SNAPSHOT.jar
          retention-days: 1

  # Step 2: Docker build image (auto, all branches)
  build-image:
    name: 2. Build Docker Image
    needs: build-jar
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-tag.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Set image tag
        id: image-tag
        run: echo "image=${{ env.IMAGE_REPO }}:${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ steps.image-tag.outputs.image }}
            ${{ env.IMAGE_REPO }}:latest

  # Step 3: Push image to Artifact Registry (manual, master only)
  push-image:
    name: 3. Push Image
    needs: build-image
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: push-approval
    outputs:
      image: ${{ needs.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.build-image.outputs.image }}
            ${{ env.IMAGE_REPO }}:latest

  # Step 4: Deploy to Cloud Run (manual, master only)
  deploy:
    name: 4. Deploy to Cloud Run
    needs: push-image
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.push-image.outputs.image }}
          region: ${{ env.REGION }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=gcp
          flags: '--allow-unauthenticated --memory=512Mi --cpu=1 --min-instances=0 --max-instances=1'

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
